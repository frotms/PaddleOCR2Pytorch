# SLANeXt_wired Table Structure Recognition Configuration
# Wired table structure recognition model.
# Architecture: ViT (SAM-style) encoder + GRU-attention autoregressive decoder.

Architecture:
  model_type: table_structure
  algorithm: SLANeXt
  model_name: SLANeXt_wired

  vision_config:
    hidden_size: 768
    output_channels: 256
    num_hidden_layers: 12
    num_attention_heads: 12
    num_channels: 3
    image_size: 512
    patch_size: 16
    hidden_act: gelu
    layer_norm_eps: 1.0e-6
    qkv_bias: true
    use_abs_pos: true
    use_rel_pos: true
    window_size: 14
    global_attn_indexes: [2, 5, 8, 11]
    mlp_dim: 3072
    attention_dropout: 0.0

  post_conv_in_channels: 256
  post_conv_out_channels: 512
  out_channels: 50
  hidden_size: 512
  max_text_length: 500
  loc_reg_num: 8

# Preprocessing
PreProcess:
  transform_ops:
    - DecodeImage:
        channel_first: false
        img_mode: BGR
    - TableLabelEncode:
        merge_no_span_structure: true
    - ResizeTableImage:
        max_len: 488
        resize_bboxes: true
    - NormalizeImage:
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]
        scale: 0.00392156862745098
        order: hwc
    - PaddingTableImage:
        size: [512, 512]
        pad_value: 0
    - ToCHWImage:
    - KeepKeys:

# Post-processing
PostProcess:
  character_dict: table_structure_dict.txt
  merge_no_span_structure: true

Global:
  model_name: SLANeXt_wired
